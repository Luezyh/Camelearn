<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Camelearn - Cronograma</title>
    <link rel="stylesheet" href="../CSS/Cronograma.css">
</head>

<body>

    <header>
        <div class="logo">Camelearn</div>

        <div class="menu">
            <a href="../index.html">Início</a>
            <a href="#">Criar cronograma</a>
            <a href="./Trilha_de_Aprendizado.html">Trilha</a>
        </div>
    </header>

    <main>

        <div class="card">
            <div class="notas">
                <h3>Notas das Matérias</h3>
                <p>Adicione as matérias desejadas</p>

                <div id="materias"></div>

                <button onclick="adicionarMateria()">Adicionar matéria</button>
            </div>
            <div class="tempo-estudo">
                <label>Tempo total de estudo (minutos):</label>
                <input type="number" id="tempo">

                <label>Duração minima de cada sessão:</label>
                <select id="bloco">
                    <option value="10">10 minutos</option>
                    <option value="15" selected>15 minutos</option>
                    <option value="20">20 minutos</option>
                    <option value="25">25 minutos</option>
                    <option value="30">30 minutos</option>
                </select>

                <button onclick="calcularCronograma()">Gerar Cronograma</button>
            </div>
        </div>

        <div class="resultado" id="resultado"></div>

    </main>

    <footer>
        <p>© 2026 Camelearn - Plataforma de estudo personalizado.</p>
    </footer>

    <script src="../JAVASCRIPT/Cronograma.js"></script>

</body>

</html>
