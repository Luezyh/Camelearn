<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Cadastro - Camelearn</title>
    <link rel="stylesheet" href="../CSS/Cadastro.css">
    <link rel="icon" type="image/svg+xml" href="../IMAGES/Logo-Tipo-svg.svg">
</head>

<body>

    <div class="cadastro-container">

        <!-- Lado esquerdo: visual -->
        <div class="cadastro-visual">
            <img src="../IMAGES/Logo-Tipo.png" alt="" class="visual-logo">
            <h2>Estude com inteligência, não com esforço aleatório.</h2>
            <p>A Camelearn organiza sua rotina e acompanha seu desempenho automaticamente.</p>
        </div>

        <!-- Lado direito: formulário -->
        <div class="cadastro-form">

            <div class="logo">
                <img src="../IMAGES/Logo-Tipo.png" alt="">
                Camelearn
            </div>

            <h1>Bem-vindo ao Camelearn</h1>
            <p class="subtitulo">Faça seu cadastro em nossa plataforma de estudos</p>

            <div id="erro" class="erro" style="display: none;"></div>

            <div class="campo">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                <i class="bi bi-eye" id="btn-senha" onclick="mostrarSenha('senha', 'btn-senha')"></i>
            </div>

            <div class="campo">
                <label for="senha2">Confirmar Senha</label>
                <input type="password" id="senha2" placeholder="••••••••" required>
                <i class="bi bi-eye" id="btn-senha2" onclick="mostrarSenha('senha2', 'btn-senha2')"></i>
            </div>

            <p id="mensagem" style="display:none;"></p>

            <button class="botao" onclick="Cadastrar()">Cadastrar na plataforma</button>

            <p class="cadastro-link">
                Já possui uma conta? <a href="./Login.html">Fazer login</a>
            </p>

        </div>

    </div>

    <script src="../JS/Cadastro-usar.js"></script>
    <script src="../JS/cadastro.js"></script>
</body>

</html>
